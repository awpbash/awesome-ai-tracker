name: Daily AI Repo Update

on:
  schedule:
    - cron: '0 8 * * *'   # Run daily at 8am UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run discovery pipeline
        run: python scripts/main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Set repository topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/topics \
            -d '{"names":["awesome-list","ai-agents","agentic-ai","llm","machine-learning","awesome","daily-updates"]}')
          if [ "$response" != "200" ]; then
            echo "Warning: failed to set repository topics (HTTP $response)"
          fi

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "daily update: ${{ github.event.schedule && 'auto' || 'manual' }} $(date -u +%Y-%m-%d)"
          file_pattern: "data/ daily/ README.md"
